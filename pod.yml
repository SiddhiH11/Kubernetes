apiVersion: v1
kind: Pod
metadata:
  name: cbz-pod
  labels:
    app: cbz-app
    env: dev
spec:
  containers:
    - name: cbz-container
      image: nginx
      ports:
        - containerPort: 80

    - name: db-container
      image: mariadb
      ports:
        - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: Redhat
