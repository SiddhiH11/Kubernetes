apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: 123-app
spec:
  strategy:
    type: RollingUpdate
  replicas: 3
  template:
    metadata:
      labels:
        app: 123-app
    spec:
      containers:
        - name: my-c
          image: httpd
          ports:
            - containerPort: 80
  selector:
    # matchLabels:
    #   app: rs-app
    matchExpressions:
      - { key: app, operator: In, values: [cbz-app, 123-app] }


# kind: Deployment → Manages Pods & ReplicaSets
# replicas: 3 → Runs 3 Pods
# selector → Matches Pods with labels
# template → Pod blueprint
# containers.image → Docker image (nginx here)

# kubectl apply -f deploy.yml

# kubectl get deployments
# kubectl get pods
# kubectl get rs

---
apiVersion: v1
kind: Service
metadata:
  name: abc-svc
  labels:
    app: 123-app
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort
  selector:
    app: 123-app
